<html lang="en">

<title>Special Date Proposal 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

body {
    margin:0;
    padding:0;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg,#f9d6d5,#ffd1dc);
    overflow-x: hidden;
    position: relative;
}

.container{
    max-width: 600px;
    margin: 50px auto;
    background: rgba(255,255,255,0.95);
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    text-align:center;
    position: relative;
}

h1{
    color:#e91e63;
    font-size:2rem;
    margin-bottom:30px;
}

button{
    padding:15px 35px;
    margin:15px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

#yes{
    background: #4caf50;
    color:white;
}

#no{
    background: #f44336;
    color:white;
    position:absolute;
}

#letter{
    display:none;
    margin-top:20px;
    font-size:18px;
    color:#333;
    animation: fadeIn 1.2s ease forwards;
    line-height:1.6;
}

@keyframes fadeIn{
    0%{opacity:0; transform: translateY(30px);}
    100%{opacity:1; transform: translateY(0);}
}

@keyframes floatUp {
    0% {transform: translateY(0px) scale(0.6);}
    100% {transform: translateY(-500px) scale(1);}
}

.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: floatHearts linear infinite;
    opacity:0.7;
}
.heart:before,.heart:after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
}
.heart:before{ top:-10px; left:0;}
.heart:after{ left:10px; top:0;}
@keyframes floatHearts{
    0%{transform: translateY(100vh) rotate(45deg) scale(0.5); opacity:0.7;}
    100%{transform: translateY(-50px) rotate(45deg) scale(1); opacity:0;}
}

/* Mobile */
@media (max-width:600px){
    .container{margin:20px; padding:25px;}
    h1{font-size:1.6rem;}
    button{padding:12px 25px; font-size:16px;}
    #letter{font-size:16px;}
}

</head>
<body>

<!-- Background music -->
<audio id="bgMusic" src="https://www.chosic.com/free-music/romantic/" autoplay loop></audio>

<div class="container">
    <h1>Will you go on a date with me? 💖</h1>
    <button id="yes">Yes 💌</button>
    <button id="no">No 😢</button>

    <div id="letter">
        <h2>💌 For You</h2>
        <p>
        From the moment I met you, my world became brighter.<br>
        Your smile lights up my day and your presence makes everything special.<br><br>
        I just want to spend some beautiful moments together, laugh, talk, and create memories.<br>
        Thank you for saying YES! ❤️
        </p>
        <!-- Add image example -->
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFyJfnvxO32vciZz83EEBSLeUXRAgbniAvkyN6x5wQXfvLW8P0Q7SfGKk&s" alt="Love" style="max-width:100%;border-radius:15px;margin-top:15px;">
    </div>
</div>

<script>
// No button hide after Yes
let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");

noBtn.addEventListener("mouseover", function(){
    let x = Math.random()*(window.innerWidth-noBtn.offsetWidth);
    let y = Math.random()*(window.innerHeight-noBtn.offsetHeight);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// Yes button click
yesBtn.onclick = function(){
    document.getElementById("letter").style.display = "block";
    noBtn.style.display = "none"; // hide No button
    launchFlowers();
};

// Flowers animation
function launchFlowers(){
    for(let i=0;i<20;i++){
        let flower = document.createElement("div");
        flower.classList.add("flower");
        flower.style.left = Math.random()*window.innerWidth + "px";
        flower.style.animationDuration = 2 + Math.random()*2 + "s";
        document.body.appendChild(flower);
        setTimeout(()=>flower.remove(),4000);
    }
}

// Floating hearts background
for(let i=0;i<25;i++){
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random()*window.innerWidth + "px";
    heart.style.animationDuration = 5 + Math.random()*5 + "s";
    heart.style.width = 10 + Math.random()*20 + "px";
    heart.style.height = 10 + Math.random()*20 + "px";
    document.body.appendChild(heart);
}
</script>
